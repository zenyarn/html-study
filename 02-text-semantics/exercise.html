<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>练习二：个人简介页面</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.7; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    pre { background: #f0f0f0; padding: 16px; border-radius: 8px; }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid #ccc; margin-left: 0; padding-left: 20px; color: #555; }
  </style>
</head>
<body>

  <!--
    练习二：用语义标签写个人简介页面
    ============================================================
    要求（按顺序完成，不要跳过）：

    1. 【标题层级】
       - 用 h1 写你的名字或昵称（作为页面主标题）
       - 用 h2 写"技术背景"章节标题
       - 在 h2 下用 h3 写两个子章节，例如"熟悉的语言"和"学习目标"

    2. 【段落与强调】
       在"熟悉的语言"h3 下写一段 p：
       - 提到你熟悉的编程语言（用 <code> 标记每个语言名称）
       - 用 <strong> 标记你最擅长的那门语言
       - 用 <em> 标记你最感兴趣的技术方向

    3. 【学习目标段落】
       在"学习目标"h3 下：
       - 写两段 p 介绍你的学习目标
       - 使用 <abbr> 为 "HTML"、"CSS"、"JS" 等缩写添加完整名称

    4. 【代码块】
       用 h2 写"我写过的第一行代码"章节，
       然后用 <pre><code> 展示你印象最深的一段代码（任意语言）

    5. 【引用】
       用 h2 写"我喜欢的一句话"章节，
       用 <blockquote> 引用一句你觉得有意思的话，并在下面用 <p> 标注来源

    6. 【时间】
       在页面底部用 <p> 写"本页创建于"，
       用 <time datetime="YYYY-MM-DD"> 标记今天的日期，
       显示文字用"2026 年 3 月 17 日"这样的中文格式

    检验：完成后用浏览器打开，按 F12 查看 Elements，
    确认标题层级是否正确，是否没有跳级使用。
    ============================================================
  -->

  <!-- TODO: 从这里开始写你的内容 -->

</body>
</html>
