<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>练习三：个人主页</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.7; }
    nav { background: #1a1a1a; padding: 12px 20px; border-radius: 8px; margin-bottom: 32px; }
    nav a { color: #fff; text-decoration: none; margin-right: 20px; }
    figure { margin: 24px 0; }
    figcaption { font-size: 0.875em; color: #666; text-align: center; margin-top: 8px; }
    img { border-radius: 8px; }
  </style>
</head>
<body>

  <!--
    练习三：搭建个人主页（链接 + 图片）
    ============================================================
    要求：

    1. 【导航栏（先放在这里，第六章会学用 <nav> 包裹）】
       在页面顶部创建一组链接：
       - "首页" → href="/"
       - "关于我" → href="/about"
       - "我的项目" → href="/projects"
       - "GitHub" → 链接到你的 GitHub 主页（外部链接，安全写法！）
       - "发送邮件" → 使用 mailto: 链接

       关键点：外部链接必须加 target="_blank" 和正确的 rel 属性

    2. 【页面主标题与简介】
       - 用 h1 写你的名字
       - 写一到两段 p 自我介绍

    3. 【头像图片】
       使用以下占位图 URL 作为头像：
       https://picsum.photos/seed/avatar/200/200
       要求：
       - 写有意义的 alt 属性（描述这张图的内容）
       - 写 width 和 height 属性
       - 用 <figure> + <figcaption> 包裹，标题写"我的头像"

    4. 【项目展示】
       用 h2 写"我的项目"章节，然后展示 2 个假想项目：
       每个项目包含：
       - 项目截图（用 https://picsum.photos/seed/项目名/400/250 作为占位图）
       - 配图 figcaption 说明
       - 项目名称（h3）
       - 项目描述（p）
       - 两个链接：
         * "查看代码" → GitHub 链接（外部，安全写法）
         * "在线演示" → 任意 URL（外部，安全写法）

    5. 【页面内锚点】
       - 在导航栏添加一个"联系方式"链接，href="#contact"
       - 在页面底部创建一个 id="contact" 的 h2 标题
       - 在这个 h2 下写你的联系方式（邮件链接 + 任意其他）

    检验清单：
    □ 所有外部链接都有 target="_blank" 和 rel="noopener noreferrer"
    □ 所有图片都有有意义的 alt 属性
    □ 所有图片都写了 width 和 height
    □ 点击"联系方式"链接能跳转到页面底部
    □ 点击邮件链接能打开邮件客户端
    ============================================================
  -->

  <!-- TODO: 在这里写你的内容 -->

</body>
</html>
