<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>练习四：技能清单与学习计划</title>
  <style>
    body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; line-height: 1.7; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
    th { background: #f5f5f5; }
    caption { font-weight: bold; margin-bottom: 8px; text-align: left; }
    dl dt { font-weight: bold; margin-top: 12px; }
    dl dd { margin-left: 24px; color: #555; }
    nav ul { display: flex; list-style: none; padding: 8px 0; gap: 20px; }
    nav a { text-decoration: none; color: #1a1a1a; font-weight: bold; }
  </style>
</head>
<body>

  <!--
    练习四：技能清单 + 学习计划表格
    ============================================================
    要求：

    1. 【导航（ul + li + a 结构）】
       创建一个页面内导航，包含以下锚点链接：
       - "技术技能" → #skills
       - "学习路线" → #roadmap
       - "术语词典" → #glossary
       - "周计划表" → #schedule
       注意：用 <nav><ul><li><a href="#..."> 的完整结构

    2. 【技术技能（嵌套无序列表）】
       id="skills" 的 h2 标题下，创建嵌套 ul：
       - 第一层：大类（如"前端"、"语言"、"工具"）
       - 第二层：每个大类下具体的技术（至少各 3 条）

    3. 【学习路线（有序列表）】
       id="roadmap" 的 h2 标题下：
       创建一个有序列表，列出你接下来 5 个学习步骤
       （例如：完成 HTML → 学 CSS 基础 → 入门 React → ...）

    4. 【术语词典（描述列表）】
       id="glossary" 的 h2 标题下：
       用 <dl><dt><dd> 创建至少 4 个你在学习中遇到的术语和定义
       （可以包括：DOM、虚拟DOM、SEO、CLS、语义化、JSX 等）

    5. 【周学习计划（表格）】
       id="schedule" 的 h2 标题下，创建一个本周学习计划表格：
       - caption: "本周 HTML 学习计划"
       - 列：星期一 到 星期五（加上"任务"列头）
       - 行：上午 / 下午 / 晚上
       - 使用 <thead><tbody><tfoot> 完整结构
       - 在某一行使用 colspan 合并至少两个相邻单元格
         （例如："自由复习时间"跨越周四和周五）
       - thead 和 tbody 中的第一列用 <th scope="row"> 而不是 <td>

    检验清单：
    □ 点击导航中的链接，页面能滚动到对应章节
    □ 技能列表有两层嵌套，视觉上能看到层级
    □ 学习路线是有序列表（数字编号）
    □ 术语词典每个 dt 后面都有 dd
    □ 表格有 caption、thead、tbody、tfoot
    □ 至少有一处 colspan 合并单元格
    □ 列标题用 th scope="col"，行标题用 th scope="row"
    ============================================================
  -->

  <!-- TODO: 在这里写你的内容 -->

</body>
</html>
